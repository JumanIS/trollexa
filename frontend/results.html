<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trollexa - Search Results</title>
    <!-- Offline Bootstrap -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <!-- Shared Unified CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <!-- Top Nav App Bar -->
    <div class="top-nav d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center flex-grow-1 nav-search">
            <a href="index.html" class="trollexa-logo me-4"><img src="images/logo.png" alt="Trollexa" class="logo-nav"></a>
            <div class="search-input-wrapper bg-white">
                <input type="text" id="searchInput" placeholder="Search products...">
                <button class="icon-btn mic" id="voiceSearchBtnRedirect" title="Search by Voice">
                    <i class="icon icon-mic"></i>
                </button>
                <button class="icon-btn" id="cameraSearchBtnRedirect" title="Identify Product">
                    <i class="icon icon-camera"></i>
                </button>
                <button class="search-btn-blue" id="textSearchBtn">
                    <i class="icon icon-search search-icon-white"></i>
                </button>
            </div>
        </div>
        
        <div class="d-flex align-items-center gap-2">
            <a href="manager.html" class="btn bg-white rounded px-3 py-1 fw-bold text-primary border" id="adminToolLinkResults">Admin</a>
            <button class="btn bg-white position-relative rounded px-3 py-1 d-flex align-items-center gap-2 top-nav-cart-btn" data-bs-toggle="modal" data-bs-target="#cartModal">
                <i class="icon icon-cart"></i>
                <span id="cartCountBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger cart-badge">0</span>
            </button>
            <button class="icon-btn" id="exitKioskBtn" title="Exit Kiosk">
                <img src="icons/fullscreen.svg" alt="Exit" style="width:24px;height:24px;" />
            </button>
        </div>
    </div>

    <!-- Category Sub-Nav Wrapper -->
    <div class="filter-bar" id="subCategoriesNav">
        <!-- Javascript injects categories here -->
    </div>

    <div class="container-fluid p-0">
        <div class="row g-0">
            
            <!-- Left Side: Search Results Column (5 cols) -->
            <div class="col-lg-5 col-xl-4 results-container">
                <p class="text-muted small mb-3">Found <span id="resultsCount">0</span> results for "<span id="searchQueryLabel">...</span>"</p>
                <div id="resultsList" class="d-flex flex-column gap-1">
                    <!-- Products generated by JS -->
                </div>
            </div>

            <!-- Right Side: Interactive SVG Map (7 cols) -->
            <div class="col-lg-7 col-xl-8 map-container">
                <div class="svg-map-wrapper">
                    <svg id="storeMap" viewBox="0 0 6 6">
                        <defs>
                            <!-- Elegant Dot Pattern for Background -->
                            <pattern id="dotGrid" width="0.4" height="0.4" patternUnits="userSpaceOnUse">
                                <circle cx="0.2" cy="0.2" r="0.015" fill="#dadce0"/>
                            </pattern>
                        </defs>
                        
                        <!-- Rotatable Map Layer -->
                        <g id="map-layer" class="map-layer-anim">
                            <rect width="6" height="6" fill="url(#dotGrid)" />
                            <g id="svgShelves"></g>
                            <polyline id="svgRoute" fill="none" stroke="#007bff" stroke-width="0.08" stroke-dasharray="0.1,0.1" stroke-linecap="round" />
                            <circle id="targetPin" r="0.12" fill="#ea4335" class="d-none" />
                        </g>
                        
                        <!-- User's Cart Position -->
                        <g id="cartMarker" style="transition: transform 0.5s linear;">
                            <circle cx="0" cy="0" r="0.14" fill="white" stroke="#62b19f" stroke-width="0.03" />
                            <circle cx="0" cy="0" r="0.06" fill="#62b19f" />
                        </g>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Cart Modal Remains Default -->
    <div class="modal fade" id="cartModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 12px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Shopping Cart</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <ul class="list-group list-group-flush" id="cartItemList"></ul>
                    <h4 class="mt-4 text-end fw-bold text-primary">Total: <span id="cartTotalSum">0.00</span> AED</h4>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary rounded-pill px-4" id="checkoutBtn">Fake Checkout</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
